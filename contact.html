<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 - AI 웹툰 쇼츠 제작기</title>
    <meta name="description" content="AI 웹툰 쇼츠 제작기에 대해 궁금한 점이 있으신가요? 언제든지 문의해주세요.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-right-buttons">
        <a href="index.html" class="button-link">홈으로</a>
    </div>

    <div class="container">
        <h1>문의하기</h1>
        <p>AI 웹툰 쇼츠 제작기에 대한 질문, 제안, 또는 피드백이 있으시면 아래 양식을 통해 보내주세요.</p>

        <form id="contact-form" class="contact-form">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">메시지</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit" id="submit-btn">메시지 보내기</button>
        </form>
        <div id="form-status"></div>
    </div>

    <footer>
        <p>&copy; 2024 AI Webtoon Shorts Maker. All Rights Reserved.</p>

            <a href="index.html">홈</a> |

            <a href="contact.html">문의하기</a>
        </nav>
    </footer>

    <script src="main.js"></script>
</body>
</html>
