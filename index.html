<head>

<body>
    <div class="top-right-buttons">
        <button id="toggle-feature-btn" data-ko="동물상 테스트" data-en="Animal Face Test">동물상 테스트</button>
        <button id="toggle-lang-btn" data-ko="ENGLISH" data-en="한글">ENGLISH</button>
        <button id="toggle-dark-mode-btn" data-ko="Dark Mode" data-en="Dark Mode">Dark Mode</button>
    </div>

    <div id="dinner-feature" class="container">
        <h1 data-ko="오늘 저녁 뭐 먹지?" data-en="What to Eat for Dinner?">오늘 저녁 뭐 먹지?</h1>
        <p data-ko="결정 장애는 이제 그만! 버튼 하나로 저녁 메뉴를 추천받으세요. 매일 똑같은 고민을 해결해드립니다." data-en="Stop hesitating! Get dinner suggestions with a single click. We solve your daily dilemma."></p>
        <div id="dinner-suggestion-box" class="suggestion-box">?</div>
        <button id="generate-dinner-btn" data-ko="메뉴 추천" data-en="Get Suggestion">메뉴 추천</button>
    </div>

    <div id="animal-feature" class="container" style="display:none;">
        <h1 data-ko="동물상 테스트" data-en="Animal Face Test">동물상 테스트</h1>
        <p data-ko="나는 어떤 동물과 닮았을까? 인공지능이 당신의 얼굴을 분석하여 알려드립니다. 사진은 절대 저장되지 않으니 안심하세요." data-en="Which animal do I look like? AI will analyze your face and tell you. Your photos are never saved."></p>
        <img id="image-preview" style="display:none; max-width: 100%; margin: 20px 0;" />
        <div id="label-container"></div>
        <input type="file" id="image-upload" accept="image/*" style="display: none;">
        <label for="image-upload" class="custom-file-upload" data-ko="이미지 선택" data-en="Choose Image">이미지 선택</label>
        <button id="predict-button" style="display:none;" data-ko="판별하기" data-en="Predict">판별하기</button>
