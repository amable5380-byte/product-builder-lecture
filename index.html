<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>동물상 테스트</h1>
        <p>얼굴 사진을 업로드하여 동물상을 확인해보세요.</p>
        <img id="image-preview" style="display:none; max-width: 100%; margin: 20px 0;" />
        <div id="label-container"></div>
        <input type="file" id="image-upload" accept="image/*" style="display: none;">
        <label for="image-upload" class="custom-file-upload">이미지 선택</label>
        <button id="predict-button" style="display:none;">판별하기</button>
    </div>

    <div class="container" id="contact-form">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/mqeypzgw" method="POST">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Send</button>
        </form>
    </div>

    <div class="container" id="disqus_thread"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>

</body>
