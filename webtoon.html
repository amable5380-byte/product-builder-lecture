<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 웹툰 쇼츠 제작기 - 당신의 일상을 더 즐겁게</title>
    <meta name="description" content="좋아하는 웹툰의 URL을 입력하면 AI가 자동으로 분석하여 1분 쇼츠 영상으로 만들어 드립니다.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-right-buttons">
        <a href="index.html" class="button-link">홈으로</a>
    </div>

    <div class="container">
        <h1>AI 웹툰 쇼츠 제작기</h1>
        <p>좋아하는 웹툰의 URL을 입력하고 버튼을 누르면, AI가 자동으로 멋진 쇼츠 영상을 만들어 드립니다. (현재 프론트엔드 UI만 구현되어 있습니다.)</p>
        
        <div class="webtoon-form">
            <input type="url" id="webtoon-url" placeholder="웹툰 URL을 여기에 붙여넣으세요">
            <button id="create-shorts-btn">쇼츠 제작하기</button>
        </div>

        <div id="webtoon-status" style="margin-top: 20px; text-align: left; background: #f3f3f3; padding: 15px; border-radius: 8px;">
            <!-- Status messages will appear here -->
        </div>
    </div>

    <footer>
        <p>&copy; 2023 오늘 뭐 먹지? & 동물상 테스트. All Rights Reserved.</p>

            <a href="index.html">홈</a> |

            <a href="privacy.html">개인정보처리방침</a> |
            <a href="contact.html">문의하기</a>
        </nav>
    </footer>
    <script src="webtoon.js"></script>
</body>
</html>
